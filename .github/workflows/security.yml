name: Deploy Tank Game to Azure Container Apps with Security

on:
  push:
    branches:
      - main  # Tự động kích hoạt pipeline bất cứ khi nào bạn push code mới lên nhánh main

# =========================================================================
# PHẦN 1: CẤP QUYỀN BẢO MẬT (QUAN TRỌNG ĐỂ KÝ SỐ KHÔNG DÙNG MẬT KHẨU - KEYLESS)
# =========================================================================
permissions:
  id-token: write  # Cho phép GitHub Actions tạo mã định danh OIDC tạm thời để chứng thực với hệ thống ký số Sigstore
  contents: read   # Chỉ cho phép runner đọc mã nguồn của repository, không cho sửa đổi bậy bạ

jobs:
  build-and-secure:
    runs-on: ubuntu-latest  # Sử dụng môi trường máy ảo Ubuntu phiên bản mới nhất do GitHub cấp phát sạch

    steps:
    # ---------------------------------------------------------------------
    # Bước 1: Tải mã nguồn từ GitHub về máy ảo của Pipeline
    # ---------------------------------------------------------------------
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # ---------------------------------------------------------------------
    # Bước 2: Đăng nhập an toàn vào hệ thống lưu trữ đám mây Azure ACR
    # ---------------------------------------------------------------------
    - name: Log in to Azure Container Registry (ACR)
      uses: azure/docker-login@v2
      with:
        login-server: tankgameregistry.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # ---------------------------------------------------------------------
    # Bước 3: Đóng gói toàn bộ code game thành file Docker Image với tag latest
    # ---------------------------------------------------------------------
    - name: Build Docker Image
      run: |
        docker build -t tankgameregistry.azurecr.io/tank-game:latest .

    # =========================================================================
    # PHẦN 2: TRIỂN KHAI CÁC CÔNG CỤ BẢO MẬT CHUỖI CUNG ỨNG (SUPPLY CHAIN SECURITY)
    # =========================================================================

    # Bước 4: Sử dụng công cụ TRIVY để quét các lỗ hổng an ninh bảo mật (CVE) trên bản latest và xuất báo cáo HTML
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'tankgameregistry.azurecr.io/tank-game:latest'
        format: 'template'
        template: '@/contrib/html.tpl' # Sử dụng template HTML có sẵn của Trivy để tạo giao diện đẹp mắt
        output: 'trivy-report.html'   # Tên file báo cáo xuất ra
        exit-code: '0'       # Trả về mã 0 để tiếp tục demo
        ignore-unfixed: true # Bỏ qua các lỗ hổng mà thư viện mã nguồn mở chưa có bản vá công khai
        vuln-type: 'os,library' # Quét cả hệ điều hành nền lẫn các thư viện Node.js
        severity: 'CRITICAL,HIGH' # Chỉ tập trung lọc ra các lỗi ở mức độ Nguy hiểm và Cực kỳ nguy hiểm

    # Bước 4.5: Đóng gói và tải báo cáo Trivy lên GitHub Artifacts để tải về làm minh chứng
    - name: Upload Trivy Scan Report
      uses: actions/upload-artifact@v4
      with:
        name: tank-game-trivy-report
        path: trivy-report.html

    # Bước 5: Sử dụng công cụ Syft để kiểm kê và tự động xuất danh mục linh kiện phần mềm (SBOM)
    - name: Generate SBOM using Syft
      uses: anchore/sbom-action@v0
      with:
        image: 'tankgameregistry.azurecr.io/tank-game:latest'
        output-file: 'sbom.spdx.json' # Tên file chứa kết quả danh mục linh kiện
        format: 'spdx-json'           # Xuất theo định dạng tiêu chuẩn quốc tế SPDX để kiểm toán an ninh

    # Bước 6: Đóng gói và lưu trữ file báo cáo SBOM trực tiếp lên trang kết quả của GitHub
    - name: Upload SBOM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tank-game-sbom  # Tên của file nén .zip chứa báo cáo hiển thị trên web GitHub
        path: sbom.spdx.json

    # =========================================================================
    # PHẦN 3: BÀN GIAO SẢN PHẨM SẠCH VÀ TIẾN HÀNH KÝ SỐ CHỐNG GIẢ MẠO
    # =========================================================================

    # Bước 7: Đẩy chính thức Docker Image đã qua kiểm duyệt lên mây Azure ACR
    - name: Push Image to ACR
      run: |
        docker push tankgameregistry.azurecr.io/tank-game:latest

    # Bước 8: Khởi tạo và cài đặt công cụ ký số điện tử Cosign vào runner
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.5.0

    # Bước 9: Tiến hành đóng dấu ký số điện tử (Sign) xác thực tính toàn vẹn cho Image
    - name: Sign the published Docker image
      env:
        COSIGN_EXPERIMENTAL: "1" # Kích hoạt chế độ thử nghiệm ký số Keyless tiên tiến của Sigstore
      run: |
        cosign sign --yes tankgameregistry.azurecr.io/tank-game:latest

    # Bước 9.5: Xác minh chữ ký số của Image vừa ký (Đã lược bớt regex identity theo yêu cầu)
    - name: Verify Image Signature
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign verify \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          tankgameregistry.azurecr.io/tank-game:latest

    # =========================================================================
    # PHẦN 4: ĐĂNG NHẬP VÀ DEPLOY TỰ ĐỘNG LÊN AZURE CONTAINER APP
    # =========================================================================

    # Bước 10: Đăng nhập vào hệ thống Azure CLI thông qua Service Principal bảo mật đã cấu hình
    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    # Bước 11: Deploy tự động Image lên Azure Container App (Sửa acrName trực tiếp thành tankgameregistry)
    - name: Deploy to Azure Container App
      uses: azure/container-apps-deploy-action@v2
      with:
        acrName: tankgameregistry
        containerAppName: tank-game-app
        resourceGroup: Demo-Cloud-Native
        imageToDeploy: tankgameregistry.azurecr.io/tank-game:latest

    # Bước 12: Kiểm tra xác thực trạng thái hoạt động của Container App sau khi deploy thành công
    - name: Verify ACA Revision Status
      run: |
        az containerapp show \
          --name tank-game-app \
          --resource-group Demo-Cloud-Native \
          --query "properties.provisioningState" \
          -o tsv