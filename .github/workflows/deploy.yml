name: Deploy Tank Game to Azure Container Apps with Security

on:
  push:
    branches:
      - main  # Kích hoạt tự động mỗi khi bạn push code lên nhánh main

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Kéo code từ GitHub về runner
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Đăng nhập vào Azure Container Registry (ACR) sử dụng Secrets bảo mật
    - name: Log in to Azure Container Registry (ACR)
      uses: azure/docker-login@v2
      with:
        login-server: tankgameregistry.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. Tiến hành đóng gói (Build) Docker Image local trên môi trường độc lập
    - name: Build Docker Image
      run: |
        docker build -t tankgameregistry.azurecr.io/tank-game:v1 .

    # =========================================================
    # PHẦN BẢO MẬT SUPPLY CHAIN - KIỂM TRA TRƯỚC KHI BÀN GIAO
    # =========================================================

    # 4. Quét sâu lỗ hổng bảo mật hệ điều hành nền và thư viện bằng TRIVY SCAN
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'tankgameregistry.azurecr.io/tank-game:v1'
        format: 'table'
        exit-code: '0' # Trả về '0' để tiếp tục chạy demo. Sẽ đổi thành '1' nếu muốn chặn đứng quy trình khi phát hiện nguy hiểm.
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # 5. Tự động sinh danh mục linh kiện phần mềm (SBOM) minh bạch bằng Syft theo chuẩn SPDX
    - name: Generate SBOM using Syft
      uses: anchore/sbom-action@v0
      with:
        image: 'tankgameregistry.azurecr.io/tank-game:v1'
        output-file: 'sbom.spdx.json'
        format: 'spdx-json'

    # 6. Lưu file SBOM lên GitHub Artifacts để tải về làm tài liệu minh chứng đồ án
    - name: Upload SBOM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tank-game-sbom
        path: sbom.spdx.json

    # 7. Đẩy Image sạch hoàn toàn lên mây Azure ACR
    - name: Push Image to ACR
      run: |
        docker push tankgameregistry.azurecr.io/tank-game:v1